<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login Page</title>

     <style>
        body{
            background-image: url("https://media.istockphoto.com/id/1410005276/vector/gradient-white-abstract-design-background.jpg?s=612x612&w=0&k=20&c=bgWTef7Pez389HaM0c0iMnWhT4_70wApJaHQBoLIwMA=");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            min-height: 100vh;
        }
        .container-lg{
            width: 500px;
            border-radius: 50px; 
        }
        .row{
            padding: 15px;
            border-radius: 50px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.281);
            width: 450px;  
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);        
        }
   
        .form-control, .btn, kbd{
            border-radius: 50px;
        }
        .form-control::placeholder{
            text-align: center;
            color: rgb(2, 2, 109); 
        }
        .form-control{
            background-color: rgba(189, 189, 189, 0.856);
            text-align: center;
            color: rgb(2, 2, 109);
        }
        footer{
            background-color: rgba(50, 49, 48, 0.5);
            color: white;
            position: fixed;
            bottom: 0;
            width: 20%;
            right: 0;
            padding: 10px;
            font-size: 9px;
        }
     </style>
    
</head>
<body>

<div class="container-lg d-flex justify-content-center align-items-center vh-100">
    <div class="row bg-light">
        <div class="col-lg">
            
            <div class="align-items-center justify-content-center gap-2">
                <img src="proj_logo.png" style="width: 230px; height: 110px;" class="mx-auto d-block">
                <br>
                <p class="fw-bold display-4 text-center text-secondary">Login</p>
            </div>
            
    
            <form>
                <div class="text-center">
                
                <br>
                <label for=""><kbd>Username</kbd></label>
                <br>
                <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
                <br>

                <label for=""><kbd>Password</kbd></label>
                <br>
                <input type="password" id="pwd" class="form-control" placeholder="********" required>
                </div>
                <br>
                <div class="form-check form-switch">
                <input type="checkbox" id="stay" class="form-check-input" onclick="checklog()">
                Stay logged in
                </div>

                <br>

                <p id="logged_in" class="fst-italic text-secondary"></p>
                <p id="display" class="fst-italic text-danger"></p>

                </div>
                <br>
                <div class="text-center">
                <input type="button" name="submit" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
                <input type="reset" name="reset" id="reset" value="Cancel" class="btn btn-light rounded-5">
                <hr>
                <label><a href="#" style="color: rgb(130, 130, 130);">Forgot username / password?</a></label>
                </div>
            </form>
            
        </div>
        
</div>

    <script>
let attempt_counter = 0; // persists across clicks

function authenticate() {
    let username = document.getElementById("uname").value;
    let pwd = document.getElementById("pwd").value;
    let granted = "Welcome " + username + "!";
    let denied = "Access denied. Account locked after 3 attempts!";

    // while loop that runs only once per click
    while (attempt_counter < 3) {
        if (username === "student01" && pwd === "12345678") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html"; //go to dashboard
            break; // stop loop
        } else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }
    }

    // lock after max attempts
    if (attempt_counter >= 3) {
        alert(denied);
        document.getElementById("loginBTN").disabled = true; // disable button
    }
}

        function checklog() {
            let stay = document.getElementById("stay").checked; //when checked, it reads true

        switch(stay) {
            case true:
            document.getElementById("logged_in").innerHTML = "Your session will stay active on this device.";
            break;

            case false:
            document.getElementById("logged_in").innerHTML = ""; 
            //show nothing
            break;

            //default may almost never needed since there is already true and false statement; 
        }
    }
    </script>

<footer class="footer text-center">
  <p class="m-0">Student Name  |  Grade & Section &copy;2026</p>
</footer>

</body>
</html>
