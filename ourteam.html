<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Form</title>

    <style>
        body {
            background-color: aquamarine;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            margin: 0;
            padding: 20px;
        }

        #body1,
        #body2,
        #body3,
        #forms {
            border: 2px dotted antiquewhite;
            border-radius: 20px;
            padding: 20px;
            margin: 20px auto;
            background-color: white;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin: 0;
            color: teal;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="password"] {
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: teal;
            box-shadow: 0 0 8px rgba(0, 128, 128, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        button {
            padding: 12px;
            background-color: teal;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: darkcyan;
        }
    </style>
</head>

<body>

    <div id="body1">
        <h1>Sample Content 1</h1>
    </div>

    <div id="body2">
        <h1>Sample Content 2</h1>
    </div>

    <div id="body3">
        <h1>Sample Content 3</h1>
    </div>

    <div id="forms">
        <form>
            <label for="Username">USERNAME</label>
            <input
                type="text"
                id="Username"
                placeholder="Enter your username"
                required
            >

            <label for="Password">PASSWORD</label>
            <input
                type="password"
                id="Password"
                placeholder="Enter your password"
                required
            >

            <div class="checkbox-group">
                <input type="checkbox" id="tickbox">
                <label for="tickbox">Keep me logged in</label>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
