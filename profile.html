<body>

    <div class="row justify-content-center align-items-center w-75" id="regform">

            <img src="https://www.pngall.com/wp-content/uploads/5/Profile-Transparent.png" class="rounded-circle mx-auto d-block" id="user_icon">

            <br>
            <p class="fw-bold text-secondary">+639150000001</p>
            <br>

            <br>
            <p class="fw-bold text-secondary">delacruz.jr@obmontessori.edu.ph</p>
            <br>

            <label for="gender" class="text-secondary">Gender</label>
            <br>
            <p class="fw-bold text-secondary">Male</p>
            <br>

        </form>
        </div>
    </div>

</div>

<script>
     function logout() {
        let confirmLogout = confirm("Exit now?"); //confirm() has 2 options : ok (True) and cancel(False)
        
        if (confirmLogout) { //if ok or True
            window.location.href = "index.html"; //load page
        }
    }

    function pwd(){
        alert("Please contact your school administration.");
    }
</script>
